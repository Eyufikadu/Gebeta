<div class="card" id="card">Loading...</div>

<script type="module">

import { initializeApp } from

import {
  getDatabase,
  ref,
  get
} from

  apiKey: "AIzaSyA3hmr6ir5Sn84SIN9yiyOumq4gJbYvqcE",

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// GET ID FROM URL
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get("id");

const card = document.getElementById("card");

if (!userId) {
  card.innerHTML = "No user selected";
} else {

  get(ref(db, "members/" + userId)).then(snapshot => {

    if (snapshot.exists()) {
      const data = snapshot.val();

      card.innerHTML = `
        <img src="${data.photo}" />
        <div class="name">${data.name}</div>
        <div class="phone">${data.phone}</div>
        <a href="tel:${data.phone}">Call Now</a>
      `;
    } else {
      card.innerHTML = "User not found";
    }

  });

}

</script>
